<svg xmlns="http://www.w3.org/2000/svg" viewBox="11 16 42 38">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa500"/>
      <stop offset="100%" style="stop-color:#dc9223"/>
    </linearGradient>
  </defs>
  
  <!-- VV letters centered -->
  <g transform="translate(32, 32)">
    <!-- First V (Vid) -->
    <g transform="translate(-15, -10)">
      <line x1="0" y1="0" x2="6" y2="18" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="6" y1="18" x2="12" y2="0" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Embedding dots - refined palette -->
      <circle cx="1.5" cy="4.5" r="1.3" fill="#f0a000" opacity="0.9"/>
      <circle cx="3" cy="9" r="1.3" fill="#e0c060" opacity="0.9"/>
      <circle cx="4.5" cy="13.5" r="1.3" fill="#f0b000" opacity="0.9"/>
      <circle cx="7.5" cy="13.5" r="1.3" fill="#e0c080" opacity="0.9"/>
      <circle cx="9" cy="9" r="1.3" fill="#ffa500" opacity="0.9"/>
      <circle cx="10.5" cy="4.5" r="1.3" fill="#e0c060" opacity="0.9"/>
    </g>
    
    <!-- Second V (Vec) -->
    <g transform="translate(3, -10)">
      <line x1="0" y1="0" x2="6" y2="18" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="6" y1="18" x2="12" y2="0" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Embedding dots - refined palette -->
      <circle cx="1.5" cy="4.5" r="1.3" fill="#e0c080" opacity="0.9"/>
      <circle cx="3" cy="9" r="1.3" fill="#ffa500" opacity="0.9"/>
      <circle cx="4.5" cy="13.5" r="1.3" fill="#e0c060" opacity="0.9"/>
      <circle cx="7.5" cy="13.5" r="1.3" fill="#f0b000" opacity="0.9"/>
      <circle cx="9" cy="9" r="1.3" fill="#e0c080" opacity="0.9"/>
      <circle cx="10.5" cy="4.5" r="1.3" fill="#ffa500" opacity="0.9"/>
    </g>
    
    <!-- Bottom embedding dimension bars - centered -->
    <g transform="translate(-18, 14)">
      <rect x="0" y="0" width="4" height="2" rx="1" fill="#ffa500" opacity="0.8"/>
      <rect x="5" y="0" width="3" height="2" rx="1" fill="#e0c060" opacity="0.8"/>
      <rect x="9" y="0" width="4" height="2" rx="1" fill="#f0b000" opacity="0.8"/>
      <rect x="14" y="0" width="3" height="2" rx="1" fill="#e0c080" opacity="0.8"/>
      <rect x="18" y="0" width="4" height="2" rx="1" fill="#ffa500" opacity="0.8"/>
      <rect x="23" y="0" width="3" height="2" rx="1" fill="#e0c060" opacity="0.8"/>
      <rect x="27" y="0" width="4" height="2" rx="1" fill="#f0b000" opacity="0.8"/>
      <rect x="32" y="0" width="4" height="2" rx="1" fill="#e0c080" opacity="0.8"/>
    </g>
  </g>
</svg>
