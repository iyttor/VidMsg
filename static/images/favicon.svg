<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="vmgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0EDE9"/>
      <stop offset="100%" stop-color="#2BA8A3"/>
    </linearGradient>
    <linearGradient id="linegrad" gradientUnits="userSpaceOnUse" x1="6" y1="50" x2="58" y2="50">
      <stop offset="0%" stop-color="#A0EDE9"/>
      <stop offset="100%" stop-color="#2BA8A3"/>
    </linearGradient>
    <!-- clip to the letter shapes so circles never bleed outside the strokes -->
    <clipPath id="vmclip">
      <text x="32" y="42"
        font-family="'Nunito', 'Varela Round', 'Arial Rounded MT Bold', 'Trebuchet MS', sans-serif"
        font-size="36" font-weight="400" text-anchor="middle" dominant-baseline="auto" letter-spacing="-1">VM</text>
    </clipPath>
  </defs>
  <!-- "VM" text - rounded font, gradient fill -->
  <text
    x="32" y="42"
    font-family="'Nunito', 'Varela Round', 'Arial Rounded MT Bold', 'Trebuchet MS', sans-serif"
    font-size="36"
    font-weight="400"
    fill="url(#vmgrad)"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-1"
  >VM</text>
  <!-- Texture circles over VM stroke paths -->
  <g>
    <!-- V left diagonal stroke -->
    <circle cx="10.5" cy="21.8" r="1.7" fill="#A0EDE9" opacity="0.85"/>
    <circle cx="13.0" cy="29.5" r="1.9" fill="#2BA8A3" opacity="0.8"/>
    <circle cx="16.5" cy="37.0" r="1.6" fill="#5BC9C5" opacity="0.88"/>
    <!-- V right diagonal stroke -->
    <circle cx="25.5" cy="21.8" r="1.8" fill="#3DBFBA" opacity="0.85"/>
    <circle cx="23.0" cy="29.5" r="1.6" fill="#A0EDE9" opacity="0.9"/>
    <circle cx="19.5" cy="37.0" r="1.9" fill="#7FDBD7" opacity="0.82"/>
    <!-- M left vertical stroke (center x≈35.2) -->
    <circle cx="34.2" cy="21.0" r="1.8" fill="#2BA8A3" opacity="0.85"/>
    <circle cx="34.2" cy="29.0" r="1.6" fill="#A0EDE9" opacity="0.9"/>
    <circle cx="34.2" cy="38.0" r="1.9" fill="#3DBFBA" opacity="0.82"/>
    <!-- M left inner diagonal stroke -->
    <circle cx="36.5" cy="18.3" r="1.7" fill="#5BC9C5" opacity="0.88"/>
    <circle cx="40.0" cy="25.5" r="1.9" fill="#7FDBD7" opacity="0.82"/>
    <!-- M inner V valley (bottom middle of M) -->
    <circle cx="42.5" cy="34.5" r="1.5" fill="#3DBFBA" opacity="0.85"/>
    <circle cx="44.7" cy="38.0" r="1.5" fill="#A0EDE9" opacity="0.88"/>
    <circle cx="47.0" cy="34.5" r="1.5" fill="#5BC9C5" opacity="0.82"/>
    <!-- M right inner diagonal stroke -->
    <circle cx="48.0" cy="27.4" r="1.8" fill="#A0EDE9" opacity="0.85"/>
    <circle cx="51.5" cy="19.3" r="1.6" fill="#2BA8A3" opacity="0.9"/>
    <!-- M right vertical stroke (center x≈55.6) -->
    <circle cx="54.6" cy="21.0" r="1.9" fill="#5BC9C5" opacity="0.82"/>
    <circle cx="54.6" cy="29.0" r="1.7" fill="#3DBFBA" opacity="0.88"/>
    <circle cx="54.6" cy="38.0" r="1.6" fill="#A0EDE9" opacity="0.85"/>
  </g>
  <!-- Non-uniform dashed underline -->
  <line
    x1="6" y1="50"
    x2="58" y2="50"
    stroke="url(#linegrad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-dasharray="10 4 5 4 7 4"
  />
</svg>
